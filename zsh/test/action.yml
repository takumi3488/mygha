name: 'Test'
description: 'Test zsh script project'

inputs:
  skip-test:
    description: 'Skip test execution if set to true'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Install zsh
      shell: bash
      run: sudo apt-get update && sudo apt-get install -y zsh

    - name: Run tests
      if: inputs.skip-test != 'true'
      shell: bash
      run: zsh scripts/test.zsh
